name: Storybook tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  storybook-a11y:
    name: Vitest + Storybook (a11y checks)
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ vars.NEXT_PUBLIC_SANITY_PROJECT_ID }}
      NEXT_PUBLIC_SANITY_DATASET: ${{ vars.NEXT_PUBLIC_SANITY_DATASET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.19'
          cache: npm

      # Lockfile is generated by npm 11; Node 22's bundled npm 10 resolves the
      # `sanity` uuid override differently and rejects `npm ci`. Match npm 11.
      - name: Upgrade npm to 11
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run Storybook browser tests (addon-a11y error mode)
        run: npm run test:storybook
